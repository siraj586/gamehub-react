# ============================================================
# GameHub Client — إعداد الجهاز
# ============================================================
# هذا ملف مثال. شغّل setup.py لإنشاء config.ini الحقيقي.
# أو عبّئ القيم يدوياً وسمّي الملف config.ini
# ============================================================

[server]
# عنوان سيرفر GameHub
api_url = http://192.168.1.100:8000

# وقت الانتظار بين محاولات الاتصال (ثانية)
retry_delay_seconds = 30

[device]
# كود الجهاز — يجب أن يطابق الـ resource_unit code في النظام
# مثال: PS-01، PC-03، XBOX-02
station_id = PS-01

# رقم الفرع في النظام (الافتراضي 1)
branch_id = 1

[account]
# بيانات دخول موظف أو مدير في GameHub
username = staff_user
password = your_password_here
